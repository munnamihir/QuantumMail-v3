<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>QuantumMail • Decrypt</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; padding: 18px; max-width: 920px; margin: 0 auto; }
      input { width: 100%; padding: 10px; margin: 6px 0 12px; }
      button { padding: 10px 14px; cursor: pointer; }
      .muted { color:#666; }
      .ok { color:#0a7a2f; white-space: pre-wrap; }
      .err { color:#b00020; white-space: pre-wrap; }
      pre { background:#f5f5f5; padding:12px; border-radius:12px; overflow:auto; }
    </style>
  </head>
  <body>
    <h2>QuantumMail • Decrypt</h2>
    <p class="muted">
      Decryption requires the QuantumMail Chrome extension to be installed & enabled.
    </p>

    <div id="extStatus" class="muted">Checking extension…</div>

    <h3>Org Login (No Password)</h3>
    <label>Org Id</label>
    <input id="orgId" placeholder="org_xxx" />
    <label>Username</label>
    <input id="username" placeholder="mihir" />
    <button id="btnDecrypt">Decrypt with Extension</button>

    <h3>Decrypted Message</h3>
    <pre id="out">(empty)</pre>

    <p id="ok" class="ok"></p>
    <p id="err" class="err"></p>

    <script src="/decrypt.js"></script>
  </body>
</html>
